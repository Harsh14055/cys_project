<!DOCTYPE html>
<html>

<head>
<title>Malware Detection System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="text-center mb-4">
Malware Detection System
</h1>


<!-- Upload Panel -->

<div class="card bg-secondary p-4">

<h4>Upload File</h4>

<!-- FORM added -->
<form id="uploadForm">

<input type="file" id="fileInput" class="form-control mb-3" required>

<button type="button" class="btn btn-danger" id="scanBtn">
Scan File
</button>

</form>

</div>


<!-- Scan Result -->

<div class="card bg-secondary mt-4 p-4">

<h4>Scan Result</h4>

<p><b>File Name:</b> <span id="fileName">-</span></p>

<p><b>MD5:</b> <span id="md5">-</span></p>

<p><b>SHA256:</b> <span id="sha256">-</span></p>

<p><b>Status:</b>
<span id="status" class="badge bg-dark">Waiting</span>
</p>

</div>


<!-- Logs -->

<div class="card bg-secondary mt-4 p-4">

<h4>Detection Logs</h4>

<ul id="logs"></ul>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
