<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Malware Detection Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body id="body">

<nav class="navbar navbar-light bg-light shadow-sm">

<div class="container d-flex justify-content-between">

<h4 class="navbar-brand mb-0">
🛡 Malware Detection Dashboard
</h4>

<div class="theme-toggle">

<span>🌞</span>

<label class="switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>

<span>🌙</span>

</div>

</div>

</nav>

<div class="container mt-4">

<!-- Upload Panel -->

<div class="card upload-card">

<h5>Upload File</h5>

<input type="file" id="fileInput" class="form-control mt-3">

<button class="scan-btn mt-3" id="scanBtn">
Scan File
</button>

</div>


<!-- Main Dashboard -->

<div class="row mt-4">

<div class="col-md-6">

<div class="card dashboard-card">

<h5>File Details</h5>

<p><b>File:</b> <span id="fileName">-</span></p>

<p><b>MD5:</b></p>
<p class="hash" id="md5">-</p>

<p><b>SHA256:</b></p>
<p class="hash" id="sha256">-</p>

<p><b>Detection Result</b></p>

<div id="statusBox" class="status-box">
Waiting
</div>

</div>

</div>


<div class="col-md-6">

<div class="card dashboard-card">

<h5>Detection Statistics</h5>

<canvas id="statsChart"></canvas>

</div>

</div>

</div>


<!-- Logs -->

<div class="card dashboard-card mt-4">

<h5>Detection Logs</h5>

<ul id="logs"></ul>

</div>


<!-- History -->

<div class="card dashboard-card mt-4">

<h5>Scan History</h5>

<table class="table">

<thead>
<tr>
<th>File</th>
<th>Status</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
